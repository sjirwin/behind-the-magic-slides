<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>

		<title>Behind the Magic</title>

		<link rel="stylesheet" href="css/reset.css" />
		<link rel="stylesheet" href="css/reveal.scss" />
		<link rel="stylesheet" href="css/theme/white.scss" />

		<!-- Theme used for syntax highlighted code -->
		<link rel="stylesheet" href="plugin/highlight/zenburn.css" />

		<!-- re-enable footer -->
		<link rel="stylesheet" href="styles/bloomberg.css">
	</head>
	<body>
		<div class="reveal">
			<div class="slides">
				<section data-markdown="slides.md"
					data-separator="^\r?\n===r?\n$"
					data-separator-vertical="^\r?\n------\r?\n$"
					data-separator-notes="^Note:"
					data-charset="iso-8859-15"
					data-transition="slide">
			</div>
		</div>

		<script type="module">
			import Reveal from 'reveal.js';
			import RevealNotes from 'reveal.js/plugin/notes';
			import RevealMarkdown from 'reveal.js/plugin/markdown';
			import RevealHighlight from 'reveal.js/plugin/highlight';

			// More info about initialization & config:
			// - https://revealjs.com/initialization/
			// - https://revealjs.com/config/
			Reveal.initialize({
				hash: true,

				controlsLayout: 'edges',
				center: false,
				width: 1920,
				height: 1080,

				// Learn about plugins: https://revealjs.com/plugins/
				plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
			});
		</script>
	</body>
	<footer><img src='images/bloomberg-copyright-with-cc-license.svg'></footer>
</html>
